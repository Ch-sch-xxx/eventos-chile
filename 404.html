<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>404 - Eventos Chile</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script>
      // SPA redirect for GitHub Pages - rafrex/spa-github-pages
      (function () {
        var segmentCount = 1;
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(segmentCount)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body>
    <h1>Redirigiendo...</h1>
    <p>Si no eres redirigido automáticamente, <a href="/eventos-chile/">haz clic aquí</a>.</p>
  </body>
</html>
